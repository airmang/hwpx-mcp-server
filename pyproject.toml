[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hwpx-mcp-server"
version = "2.23.0"
description = "MCP server for reading, editing, inspecting, and validating local HWPX documents with AI agents."
readme = "README.md"
authors = [{ name = "Kohkyuhyun" }]
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
requires-python = ">=3.10"
keywords = ["hwpx", "hancom", "mcp", "model-context-protocol", "document-automation", "ai-agent"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "python-hwpx>=2.29.1", # typed blueprint dump/replay, release-test fix, SQUEEZE-to-BREAK safety, and prior capabilities

    "pydantic>=2.7",
    "cryptography>=42.0",
    "anyio>=4.0",
    # mcp 2.x moved the public type surface; this server targets the 1.x API.
    "mcp>=1.14.1,<2",
    "modelcontextprotocol>=0.1.0",
    "tomli>=2.0; python_version < '3.11'",
]

[project.optional-dependencies]
# Legacy .hwp (HWP5/OLE2) reading. Lazy-imported; clear error if missing.
hwp = ["olefile>=0.47"]
# HTTP/streamable transport. The default stdio transport needs no extra.
http = ["uvicorn>=0.30"]
# General non-HWPX document ingest through Microsoft's MarkItDown. Lazy-imported.
ingest = ["markitdown[all]>=0.1.6"]
# 직인 날인/검증의 한컴 렌더 오라클 경로(렌더→fitz word/image bbox). macOS+Hancom 필요;
# 없으면 place_seal/check_seal_compliance가 renderChecked=false로 정직하게 degrade한다.
oracle = ["python-hwpx[visual]>=2.29.1"]
vision = ["python-hwpx[visual]>=2.29.1"]
test = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "olefile>=0.47",
    "uvicorn>=0.30",
    "numpy>=1.26",
    "pillow>=10.0",
]

[project.urls]
Homepage = "https://github.com/airmang/hwpx-mcp-server"
Issues = "https://github.com/airmang/hwpx-mcp-server/issues"

[project.scripts]
"hwpx-mcp-server" = "hwpx_mcp_server.server:main"

# Co-located development: resolve python-hwpx from the sibling checkout.
# This affects local `uv` resolution only; published metadata keeps `python-hwpx>=2.29.1`.
[tool.uv.sources]
python-hwpx = { path = "../python-hwpx", editable = true }

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
addopts = "-q"
