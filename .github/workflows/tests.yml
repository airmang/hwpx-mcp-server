name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          path: hwpx-mcp-server
      - uses: actions/checkout@v4
        with:
          repository: airmang/python-hwpx
          path: python-hwpx
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[test]"
        working-directory: hwpx-mcp-server
      - run: python -m pytest -q
        working-directory: hwpx-mcp-server
      - run: python scripts/render_tool_contract.py --check --skip-skill
        working-directory: hwpx-mcp-server
