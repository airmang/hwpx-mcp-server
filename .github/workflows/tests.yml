name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: hwpx-mcp-server
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: airmang/python-hwpx
          path: python-hwpx
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ../python-hwpx
        working-directory: hwpx-mcp-server
      - run: python -m pip install -e ".[test]"
        working-directory: hwpx-mcp-server
      - run: python scripts/check_public_hygiene.py
        working-directory: hwpx-mcp-server
      - run: ruff check --select E9,F .
        working-directory: hwpx-mcp-server
      - run: python -m pytest -q
        working-directory: hwpx-mcp-server
      - run: |
          python scripts/render_tool_contract.py --check --skip-skill
          python scripts/render_contract_delta.py --check
        working-directory: hwpx-mcp-server

  clean-package-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: base
            extras: ""
            markitdown: absent
          - label: all-runtime-extras
            extras: "[hwp,http,ingest,oracle,vision]"
            markitdown: present
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: hwpx-mcp-server
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Build wheel
        working-directory: hwpx-mcp-server
        run: |
          python -m pip install build
          python -m build --wheel
          python scripts/check_public_hygiene.py
      - name: Wait for the released core dependency
        run: |
          for attempt in $(seq 1 20); do
            if python -m pip install --no-cache-dir "python-hwpx>=3.0.0"; then
              exit 0
            fi
            echo "python-hwpx>=3.0.0 is not visible yet (${attempt}/20)"
            sleep 15
          done
          exit 1
      - name: Install wheel in a clean environment
        working-directory: hwpx-mcp-server
        env:
          EXTRAS: ${{ matrix.extras }}
          EXPECT_MARKITDOWN: ${{ matrix.markitdown }}
        run: |
          python -m venv .clean-package
          WHEEL=$(find dist -name '*.whl' -print -quit)
          .clean-package/bin/python -m pip install "${WHEEL}${EXTRAS}"
          .clean-package/bin/python -m pip check
          .clean-package/bin/python - <<'PY'
          import importlib.util
          import os
          from importlib.metadata import metadata

          requirements = metadata("hwpx-mcp-server").get_all("Requires-Dist") or []
          assert not any(item.casefold().startswith("modelcontextprotocol") for item in requirements)
          found = importlib.util.find_spec("markitdown") is not None
          assert found is (os.environ["EXPECT_MARKITDOWN"] == "present")
          assert importlib.util.find_spec("hwpx_mcp_server.practice") is None
          import hwpx_mcp_server.server
          PY
